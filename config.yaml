project:
  name: StockVue
  version: '2.0'
gumroad:
  product_permalink: zmwses
  post_title_prefix: Daily Report -
screening:
  a_share:
    min_turnover: 100000000
    min_turnover_rate: 3.0
    min_change_pct: 2.0
    max_results: 5
  hk:
    min_change_pct: 1.5
    max_results: 5
  us:
    min_change_pct: 1.5
    max_results: 5
win_rates:
  # 基於課程R:R概率原則：1:2需要≥33%勝率，1:3需要≥25%勝率
  # Tier 1: 高R:R(≥1:3) + 高confluence(≥70) → 75%
  tier1:
    1d: 75
    5d: 80
  # Tier 2: 中R:R(≥1:2) + 中confluence(≥50) → 65%
  tier2:
    1d: 65
    5d: 70
  # Tier 3: 低R:R(1:1 to 1:2) + 低confluence(≥40) → 55%
  tier3:
    1d: 55
    5d: 60
  # Tier 4: 低confluence或低R:R → 45%
  tier4:
    1d: 45
    5d: 50
  default:
    1d: 40
    5d: 45
sources:
  a_share_primary: akshare
  a_share_fallback: sina
  hk: yfinance
  us: yfinance
retry:
  max_attempts: 3
  base_delay: 2
  exponential_base: 2
output:
  reports_dir: reports
  latest_report: latest_report.txt
  log_file: stockvue.log
