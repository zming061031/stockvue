backtest:
  date: '2026-05-14'
  days: 180
  note: 'ICT/SMC Strategy: RSI 30-80, VolRatio 0.5-3.0x, Fib 0.618/0.786 zone, Confluence ≥40, Price>MA20, Win Rate ≥75%'
technical_filters:
  rsi_max: 80
  rsi_min: 30
  vol_ratio_min: 0.5
  vol_ratio_max: 3.0
  ma5_required: false
  ma20_required: false
  confluence_min: 30
display_win_rate_min: 55  # 課程：最低55%勝率門檻（對應Tier3 R:R≥1:2）
fibonacci:
  retracement_levels:
    - 0.618
    - 0.786
  premium_discount_filter: true
risk_management:
  max_trades_per_day: 3
  max_loss_per_trade_pct: 2.0  # 課程：每筆風險1-2%
  max_daily_loss: 50
  take_profit_ratios:
    # 課程：TP1/R:R需≥1:2，TP2/R:R需≥1:3，TP3可達1:5
    conservative: 2.0   # = 1:2
    normal: 3.0        # = 1:3
    aggressive: 5.0    # = 1:5
  # 課程：當R:R=1:1時開始take partial（50%/30%/70%）
  partial_take_profit: 0.5
ict_concepts:
  # 課程：50% equilibrium 是 Premium/Discount 分界線
  premium_zone_threshold: 0.5
  discount_zone_threshold: 0.5
  # 課程 confluence 評分：根據5個核心策略積分
  confluence_scoring:
    discount_zone: 30      # DISCOUNT zone（做多區域）
    premium_zone: 10       # PREMIUM zone（做空區域）
    rsi_oversold: 20       # RSI 超賣
    rsi_normal: 10
    normal_vol: 15
    high_vol_momentum: 25   # 高成交量動力
    above_ma20: 15
    above_ma5: 10
    # 課程額外評分（5個核心策略）
    liquidity_sweep: 25    # 流動性掃蕩確認
    bos: 20                # BOS 結構突破
    choch: 25              # CHoCH 趨勢改變
    mss: 25                # MSS 市場結構轉換
    bullish_fvg: 20        # 看漲 FVG
    bearish_fvg: 20        # 看跌 FVG
    ifvg: 30               # 反轉FVG（重要進場信號）
    order_block_high: 25   # 高質量Order Block
    order_block_normal: 15
    breaker_block: 20      # Breaker Block
