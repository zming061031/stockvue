name: Daily Stock Report

on:
  schedule:
    - cron: '40 * * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare yfinance requests pyyaml tenacity rich

      - name: Run StockVue daily report
        run: python daily_runner.py
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}

      - name: Commit and push dashboard update
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html reports/ latest_report.txt 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date -u +%Y-%m-%d-%H%M)"
          git push

      - name: Prepare artifact directory
        run: mkdir -p dist && cp dashboard.html dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4