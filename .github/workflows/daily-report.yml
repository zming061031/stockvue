name: Daily Stock Report

on:
  schedule:
    - cron: '40 * * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare yfinance requests pyyaml tenacity rich

      - name: Run StockVue daily report
        run: python daily_runner.py

      - name: Verify dashboard exists
        run: |
          if [ ! -f dashboard.html ]; then
            echo "ERROR: dashboard.html was not created"
            exit 1
          fi
          echo "dashboard.html exists: $(ls -la dashboard.html)"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dashboard.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4